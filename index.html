  <style>
    /* ── UNAVOIDABLE ANIMATIONS (Bootstrap has no utility for these) ── */

    /* Spinning photo ring - conic-gradient + rotation not possible in Bootstrap */
    .photo-ring { position:relative; width:110px; height:110px; flex-shrink:0; }
    .photo-ring::before {
      content:''; position:absolute; inset:0; border-radius:50%;
      background: conic-gradient(#c8a96e 0%, #f0d898 40%, #c8a96e 60%, #7a5d28 100%);
      animation: spin 6s linear infinite; z-index:0;
    }
    .photo-inner {
      position:absolute; inset:3px; border-radius:50%;
      background:#131313; overflow:hidden; z-index:1;
    }
    .photo-inner img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Card entrance - no Bootstrap utility for custom cubic-bezier entrance */
    .card-enter { animation: slideUp 0.85s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(36px) scale(0.96); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    /* Gold top accent line - ::before pseudo not possible in Bootstrap */
    .card-accent::before {
      content:''; position:absolute; top:0; left:15%; right:15%; height:2px;
      background: linear-gradient(90deg, transparent, #c8a96e, transparent);
    }

    /* Blinking cursor - step-end timing not in Bootstrap */
    .type-cursor {
      display:inline-block; width:2px; height:0.85em;
      background:#c8a96e; margin-left:2px; vertical-align:middle;
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Pulsing badge dot - scale animation not in Bootstrap */
    .pulse-dot {
      width:7px; height:7px; border-radius:50%; background:#4ade80;
      animation: pulse-dot 1.8s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.7); }
    }

    /* Copy toast - absolute centered right, opacity transition */
    .copy-toast {
      position:absolute; right:10px; top:50%; transform:translateY(-50%);
      opacity:0; pointer-events:none; transition:opacity 0.3s;
    }
    .copy-toast.show { opacity:1; }

    /* Gold divider - gradient not possible in Bootstrap hr */
    .gold-divider {
      height:1px; border:none; opacity:1;
      background: linear-gradient(90deg, transparent, rgba(200,169,110,0.5), transparent);
    }

    /* Canvas fixed background */
    #bg-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; }

    /* =========================
   RESPONSIVE FIXES
========================= */

/* Card Responsive */
#vcCard{
  width:100%;
  max-width:340px;
}

/* Photo Responsive */
.photo-ring{
  width:clamp(80px, 24vw, 110px);

/* Name Responsive */
#profileName{

/* =========================
   SKILL TAG FIX
========================= */

.skill-tags{

}

/* Skill Badge */

    min-width:110px;

    padding:8px 12px !important;

    white-space:nowrap;

}

/* Mobile Fix */

@media (max-width:400px){

    .skill-tags{

        gap:6px;

    }

    .skill-tags .badge{

        min-width:130px;

        font-size:0.6rem !important;

    }

}
  </style>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>

    // ── 1. ANIMATED BACKGROUND (canvas — no Bootstrap equivalent) ──
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    const orbs = [
      { x:0.15,y:0.20,r:0.38,hue:38, speed:0.00018,amp:0.12,phase:0.00 },
      { x:0.80,y:0.75,r:0.32,hue:210,speed:0.00023,amp:0.10,phase:1.80 },
      { x:0.50,y:0.50,r:0.28,hue:280,speed:0.00014,amp:0.08,phase:3.50 },
      { x:0.85,y:0.15,r:0.22,hue:160,speed:0.00029,amp:0.09,phase:0.90 },
      { x:0.10,y:0.80,r:0.20,hue:340,speed:0.00021,amp:0.11,phase:2.40 },
    ];
    const particles = Array.from({length:55},()=>({
      x:Math.random(), y:Math.random(),
      size:Math.random()*1.6+0.4,
      speedX:(Math.random()-0.5)*0.00012,
      speedY:(Math.random()-0.5)*0.00012,
      opacity:Math.random()*0.5+0.15,
      hue:Math.random()*360
    }));
    let t = 0;
    let isLightMode = false;

    function drawBg() {
      t++;
      // Same animation — only base color + visibility values adapt
      const bg          = isLightMode ? '#f5f0e8'              : '#060608';
      const orbA1       = isLightMode ? 0.55                   : 0.18;   // orb inner opacity
      const orbA2       = isLightMode ? 0.30                   : 0.10;   // orb mid opacity
      const orbL1       = isLightMode ? '45%'                  : '60%';  // orb inner lightness
      const orbL2       = isLightMode ? '35%'                  : '45%';  // orb mid lightness
      const orbL3       = isLightMode ? '25%'                  : '30%';  // orb outer lightness
      const gridColor   = isLightMode ? 'rgba(0,0,0,0.08)'     : 'rgba(255,255,255,0.025)';
      const ptLightness = isLightMode ? '35%'                  : '75%';  // particles dark on light
      const ptOpacity   = isLightMode ? p => p.opacity * 0.9   : p => p.opacity;

      ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

      orbs.forEach(o => {
        const cx=(o.x+Math.sin(t*o.speed+o.phase)*o.amp)*W;
        const cy=(o.y+Math.cos(t*o.speed*0.7+o.phase)*o.amp)*H;
        const r=o.r*Math.min(W,H);
        const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
        g.addColorStop(0,   `hsla(${o.hue},85%,${orbL1},${orbA1})`);
        g.addColorStop(0.4, `hsla(${o.hue},75%,${orbL2},${orbA2})`);
        g.addColorStop(1,   `hsla(${o.hue},65%,${orbL3},0.00)`);
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
        ctx.fillStyle=g; ctx.fill();
      });

      ctx.save(); ctx.strokeStyle=gridColor; ctx.lineWidth=0.5;
      for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      ctx.restore();

      particles.forEach(p=>{
        p.x+=p.speedX; p.y+=p.speedY;
        if(p.x<0)p.x=1; if(p.x>1)p.x=0;
        if(p.y<0)p.y=1; if(p.y>1)p.y=0;
        ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.size,0,Math.PI*2);
        ctx.fillStyle=`hsla(${p.hue},65%,${ptLightness},${ptOpacity(p)})`; ctx.fill();
      });

      requestAnimationFrame(drawBg);
    }
    drawBg();

    // ── 2. TYPING ANIMATION ──
    const roles = [
      "M.Sc. AI Student",
      "AI Chatbot Developer",
      "Machine Learning Engineer",
      "NLP Enthusiast",
      "Full Stack Developer",
      "Open Source Contributor",
    ];
    let rIdx=0, charIdx=0, deleting=false;
    const typedEl = document.getElementById('typed-role');
    function type() {
      const current = roles[rIdx];
      if (!deleting) {
        typedEl.textContent = current.slice(0, ++charIdx);
        if (charIdx === current.length) { deleting=true; setTimeout(type,1800); return; }
        setTimeout(type, 75);
      } else {
        typedEl.textContent = current.slice(0, --charIdx);
        if (charIdx === 0) { deleting=false; rIdx=(rIdx+1)%roles.length; setTimeout(type,400); return; }
        setTimeout(type, 40);
      }
    }
    type();

    // ── 3. COPY TO CLIPBOARD ──
    function copyText(text, toastId) {
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById(toastId);
        toast.classList.add('show');
        setTimeout(()=>toast.classList.remove('show'), 1500);
      });
    }

    // ── 4. CONFETTI ──
    function triggerConfetti() {
      confetti({ particleCount:120, spread:80, origin:{y:0.7},
        colors:['#c8a96e','#f0d898','#ffffff','#0a66c2','#4ade80'] });
    }

    // ── 5. DARK / LIGHT TOGGLE ──
    const themeBtn  = document.getElementById('themeBtn');
    const themeIcon = document.getElementById('themeIcon');
    const vcCard    = document.getElementById('vcCard');
    themeBtn.addEventListener('click', () => {
      isLightMode = !isLightMode;           // flip canvas drawing mode
      if (isLightMode) {
        // Switch to LIGHT — canvas stays visible, draws light animation
        document.body.setAttribute('data-bs-theme', 'light');
        vcCard.style.background = '#ffffffee';
        vcCard.style.border     = '1px solid rgba(200,169,110,0.4)';
        vcCard.style.boxShadow  = '0 8px 40px rgba(0,0,0,0.1)';
        themeIcon.className     = 'bi bi-moon-fill';
        themeBtn.style.color    = '#a07840';
        themeBtn.style.background = 'rgba(0,0,0,0.06)';
        themeBtn.style.borderColor = 'rgba(0,0,0,0.12)';
      } else {
        // Switch to DARK — canvas draws dark animation
        document.body.setAttribute('data-bs-theme', 'dark');
        vcCard.style.background = '#131313';
        vcCard.style.border     = '1px solid rgba(200,169,110,0.22)';
        vcCard.style.boxShadow  = '';
        themeIcon.className     = 'bi bi-sun-fill';
        themeBtn.style.color    = '#c8a96e';
        themeBtn.style.background = 'rgba(255,255,255,0.06)';
        themeBtn.style.borderColor = 'rgba(255,255,255,0.1)';
      }
    });

    // ── 6. 3D TILT ──
    const card = document.getElementById('vcCard');
    document.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      const cx = rect.left + rect.width/2;
      const cy = rect.top  + rect.height/2;
      const dx = (e.clientX - cx) / (rect.width/2);
      const dy = (e.clientY - cy) / (rect.height/2);
      card.style.transform = `perspective(900px) rotateY(${dx*6}deg) rotateX(${-dy*6}deg) scale(1.01)`;
    });
    document.addEventListener('mouseleave', () => { card.style.transform = ''; });

  </script>
